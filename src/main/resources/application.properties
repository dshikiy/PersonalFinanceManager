# Render үшін портты автоматты түрде алу
server.port=${PORT:8080}

# MySQL-дің орнына H2 қолдану
spring.datasource.url=jdbc:h2:mem:finance;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Кестелерді автоматты түрде құру
spring.jpa.hibernate.ddl-auto=update

# Groq API Key (Бұны Render-дің Environment Variables бөліміне қосасың)
groq.api.key=${GROQ_API_KEY}