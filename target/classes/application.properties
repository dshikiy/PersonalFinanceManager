# Дерекқорға қосылу баптаулары
spring.datasource.url=jdbc:mysql://localhost:3306/finance?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
spring.datasource.username=finance
spring.datasource.password=finance

# Hibernate (кестелерді автоматты түрде құру үшін)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
# Groq API Key (.env файлынан алынады)
groq.api.key=${GROQ_API_KEY}